<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURA | HUID Gold Registry & Verification System</title>
  <meta name="description" content="Secure, real-time Hallmark Unique Identification (HUID) registry for gold and jewelry verification, ownership validation, and theft prevention.">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Main Style -->
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="brand-name">
          <h1>AURA</h1>
          <span>GOLD REGISTRY</span>
        </div>
      </div>

      <nav class="nav-menu">
        <button class="nav-item active" data-view="dashboard" id="nav-dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon">
            <rect x="3" y="3" width="7" height="9" rx="1"/>
            <rect x="14" y="3" width="7" height="5" rx="1"/>
            <rect x="14" y="12" width="7" height="9" rx="1"/>
            <rect x="3" y="16" width="7" height="5" rx="1"/>
          </svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" data-view="search" id="nav-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span>Verify HUID</span>
        </button>
        <button class="nav-item" data-view="register" id="nav-register">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
          <span>Register Gold</span>
        </button>
        <button class="nav-item" data-view="manage" id="nav-manage">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <span>Status Manager</span>
        </button>
        <button class="nav-item" data-view="portfolio" id="nav-portfolio" style="display: none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          <span>Gold Portfolio</span>
        </button>
        <button class="nav-item" id="nav-logout" style="display: none; color: var(--danger); margin-top: auto;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon" style="color: var(--danger);">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span>Logout</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="avatar">JS</div>
          <div class="user-details">
            <p class="user-name">Jeweller Station</p>
            <p class="user-role">Authorized Node</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content Wrapper -->
    <main class="main-wrapper">
      <header class="app-header">
        <div class="header-title">
          <h2 id="view-title">Dashboard Overview</h2>
          <p id="view-subtitle" class="text-muted">Real-time status of registered jewelry and active HUIDs.</p>
        </div>
        <div class="header-actions">
          <div class="status-indicator">
            <span class="pulse-dot"></span>
            <span class="status-text">Network Secure</span>
          </div>
          <button class="icon-btn" id="btn-notifications" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Dynamic View Container -->
      <section class="content-container" id="content-mount">
        <!-- Rendered view content will be injected here -->
      </section>
    </main>
  </div>

  <!-- Main JavaScript Bundle -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
